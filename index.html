<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Explainer</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <h1>Quote Meaning Generator</h1>

        <button id="quoteBtn">Get Quote</button>

        <div class="card">
            <h2>Quote</h2>
            <p id="quote">Click the button to get a quote.</p>
            <p id="author"></p>
        </div>

        <div class="card">
            <h2>Meaning</h2>
            <p id="meaning">Gemini's explanation will appear here.</p>
        </div>
    </div>

    <script src="index.js"></script>

</body>
</html>
